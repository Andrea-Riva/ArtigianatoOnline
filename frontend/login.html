<!DOCTYPE html>
<html lang="it">
<link rel="icon" type="image/x-icon" href="imgs/logo.png">
<link rel="stylesheet" href="style/login.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Artigianato Online</title>

    <!-- BootStrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icone FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="style/homepage.css">
    <!-- Script -->
    <script src="script/login.js"></script>
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-center align-items-center">
                            <a href="homepage.html"><img src="imgs/logo.png" alt="Logo" style="height: 80px;"></a>
                        </div>
                        <hr>
                        <form>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group position-relative">
                                    <input type="password" class="form-control" id="password" required>
                                    <button class="btn border-0 position-absolute top-50 end-0 translate-middle-y rounded-3" type="button" id="togglePassword" style="background: transparent !important;">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 mt-3 mb-3 rounded-">Accedi</button>
                        </form>
                        <hr>
                        <div class="text-center">
                            <p class="mb-0">Non hai un account?</p>
                            <a href="register.html" class="btn btn-outline-dark mt-2">
                                <i class="fa-solid fa-user-plus"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
