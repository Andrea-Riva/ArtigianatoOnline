<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrello - Artigianato Online</title>
    
    <!-- BootStrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icone FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="imgs/logo.png">
    <link rel="stylesheet" href="style/navbar.css">
    <link rel="stylesheet" href="style/cart.css">
</head>
<body>
    <!-- Navbar Trasparente con Ombra -->
    <nav class="navbar navbar-expand-lg navbar-light navbar-transparent sticky-top">
        <div class="container">
            <a class="navbar-brand" href="homepage.html">
                <img src="imgs/logo.png" style="height: 60px;" alt="Logo">
            </a>
            <div class="d-flex align-items-center flex-grow-1 justify-content-center">
                <form class="d-flex mx-auto" style="width: 50%;"></form>
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="ms-auto d-flex align-items-center">
                    <a href="profile.html">
                        <img src="imgs/logo.png" class="rounded-circle" alt="Profile" style="width: 50px; height: 50px; object-fit: cover; border: 1px solid black;">
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Il tuo carrello</h2>
        
        <!-- Tutti i prodotti del carrello -->
        <div class="row">
            <div class="col-lg-8">
                <!-- Prodotto 1 (da generare dinamicamente) -->
                <div class="card mb-3">
                    <div class="row g-0">
                        <div class="col-md-3">
                            <img src="imgs/esempio_prodotto.png" class="img-fluid rounded-start" alt="Product">
                        </div>
                        <div class="col-md-9">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h5 class="card-title">Prodotto d'artigianato</h5>
                                    <button class="btn btn-link text-danger">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                                <p class="card-text">
                                    <small class="text-muted">Venditore: nome_utente</small>
                                </p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <div class="quantity-controls">
                                        <button class="btn btn-outline-secondary btn-sm">-</button>
                                        <span class="mx-2">1</span>
                                        <button class="btn btn-outline-secondary btn-sm">+</button>
                                    </div>
                                    <h5 class="mb-0">€25,00</h5>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Secondo prodotto nel carrello (prova) -->
                <div class="card mb-3">
                    <div class="row g-0">
                        <div class="col-md-3">
                            <img src="imgs/esempio_prodotto.png" class="img-fluid rounded-start" alt="Product">
                        </div>
                        <div class="col-md-9">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h5 class="card-title">Prodotto d'artigianato</h5>
                                    <button class="btn btn-link text-danger">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                                <p class="card-text">
                                    <small class="text-muted">Venditore: nome_utente</small>
                                </p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <div class="quantity-controls">
                                        <button class="btn btn-outline-secondary btn-sm">-</button>
                                        <span class="mx-2">1</span>
                                        <button class="btn btn-outline-secondary btn-sm">+</button>
                                    </div>
                                    <h5 class="mb-0">€18,99</h5>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Riepilogo Ordine -->
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Riepilogo ordine</h5>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Subtotale</span>
                            <span>€43,99</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Spedizione</span>
                            <span>€4,99</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <strong>Totale</strong>
                            <strong>€48,98</strong>
                        </div>
                        <button class="btn w-100 rounded-circle d-flex align-items-center justify-content-center" style="width: 45px !important; height: 45px; margin: 0 auto;">
                            <i class="fas fa-lock"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center d-none">
            <i class="fas fa-shopping-cart fa-3x mb-3"></i>
            <h3>Il tuo carrello è vuoto</h3>
            <p>Aggiungi alcuni prodotti per iniziare lo shopping!</p>
            <a href="homepage.html" class="btn btn-dark">
                <i class="fas fa-arrow-left me-2"></i>Torna allo shopping
            </a>
        </div>
    </div>

    <!-- JavaScript Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
