            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

            </button>

                        </ul>

                <form class="d-flex me-auto filter-form">
                    <div class="input-group">
                        <input class="form-control search-input" type="search" placeholder="Cerca articoli..."
                            aria-label="Cerca">
                    </div>
                    <div class="dropdown ms-2">
                        <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="priceFilterDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            Prezzo: <span id="priceRangeText">€0 - €1000</span>
                        </button>
                        <div class="dropdown-menu p-3" style="width: 300px;">
                            <div class="price-range-container">
                                <label for="minPrice" class="form-label">Minimo: €<span id="minPriceValue">0</span></label>
                                <input type="range" class="form-range" id="minPrice" min="0" max="1000" step="10" value="0" oninput="updatePriceRange()">
                                
                                <label for="maxPrice" class="form-label">Massimo: €<span id="maxPriceValue">1000</span></label>
                                <input type="range" class="form-range" id="maxPrice" min="0" max="1000" step="10" value="1000" oninput="updatePriceRange()">
                            </div>
                        </div>
                    </div>
                    <script>
                        function updatePriceRange() {
                            const minPrice = document.getElementById('minPrice').value;
                            const maxPrice = document.getElementById('maxPrice').value;
                            document.getElementById('minPriceValue').textContent = minPrice;
                            document.getElementById('maxPriceValue').textContent = maxPrice;
                            document.getElementById('priceRangeText').textContent = `€${minPrice} - €${maxPrice}`;
                        }
                    </script>
                </form>

                <div class="d-flex align-items-center">
